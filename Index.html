<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        :root {

        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a15;
            background-image:
                radial-gradient(ellipse at 50% 30%, #1a1a35 0%, #0a0a15 60%),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Nunito', system-ui, sans-serif;
            overflow-x: hidden; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; padding: 10px;
        }
        .game-wrapper {
            position: relative;
            background: linear-gradient(180deg, #1a1a32 0%, #1e1e3a 30%, #1c1c35 100%);
            border-radius: 28px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(0,0,0,0.4), 0 0 150px rgba(240,194,122,0.12), inset 0 0 80px rgba(0,0,0,0.2);
            overflow: hidden; max-width: 750px; width: 100%; aspect-ratio: 700/580; max-height: 90vh; transition: transform 0.3s ease;
        }
        .game-wrapper.mobile-mode { aspect-ratio: 400/700; max-width: 400px; }
        .game-wrapper:hover { transform: translateY(-3px); box-shadow: 0 30px 90px rgba(0,0,0,0.65), 0 0 0 4px rgba(255,255,255,0.15), 0 0 0 8px rgba(0,0,0,0.4), 0 0 170px rgba(240,194,122,0.18); }
        canvas { display: block; width: 100%; height: 100%; border-radius: 26px; cursor: default; touch-action: none; }
        .ui-overlay { position: absolute; top: 14px; left: 18px; right: 18px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; gap: 10px; }
        .score-pill {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25); border-radius: 50px; padding: 8px 18px; color: #fff; font-weight: 700; font-size: 1.05rem;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); height: 44px; box-sizing: border-box; min-width: 80px;
        }
        .score-pill .value { font-size: 1.05rem; color: #ffffff; text-align: center; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.5); line-height: 1; }
        .lives-pill {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25); border-radius: 50px; padding: 8px 18px; color: #fff; font-weight: 700; font-size: 1.05rem;
            display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1); height: 44px; box-sizing: border-box;

        .lives-pill .heart { font-size: 1.3rem; transition: all 0.3s ease; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4)); }

        .mobile-controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: none; gap: 24px; z-index: 15; }

        #homeBtn {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; width: 40px; height: 40px; font-size: 22px; color: white; cursor: pointer; z-index: 20; display: none;
            align-items: center; justify-content: center; line-height: 1; -webkit-tap-highlight-color: transparent;
            animation: homeBounce 2s infinite ease-in-out; transition: transform 0.1s;

        .game-wrapper.settings-mode #homeBtn { left: auto; right: 10px; transform: none; animation: none; }
        @keyframes homeBounce { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.15); } }
        #homeBtn:active { transform: translateX(-50%) scale(0.85); transition: transform 0.05s; }
        #coinDisplay {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px; padding: 5px 14px; display: none; align-items: center; gap: 6px; color: #fff; font-weight: 700; font-size: 1rem; z-index: 20;
        }
        .store-overlay, .settings-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 25; display: none;
            flex-direction: column; color: white; overflow-y: auto; padding: 10px; opacity: 0; transition: opacity 0.4s;

        .store-overlay.active, .settings-overlay.active { display: flex; opacity: 1; }

        .store-items { display: flex; flex-wrap: wrap; gap: 10px; }

            background: rgba(255,255,255,0.1); border-radius: 12px; padding: 8px; width: calc(33.333% - 10px); min-width: 70px;

            background: #f0c27a; border: none; border-radius: 6px; padding: 4px 10px; font-weight: bold; cursor: pointer; color: #1a1a2e; transition: transform 0.1s;

        .store-item button:active { transform: scale(0.9); }
        .store-item button:disabled { opacity: 0.4; cursor: default; }
        .store-close, .settings-close {
            align-self: flex-end; font-size: 24px; padding: 4px 8px; background: none; border: none; color: white; cursor: pointer; transition: transform 0.1s;
        }
        .store-close:active, .settings-close:active { transform: scale(0.85); }
        .preview-buttons { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 20px; z-index: 30; }
        .preview-buttons.active { display: flex; }
        .preview-btn { padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; border: none; cursor: pointer; transition: transform 0.1s; }
        .preview-btn:active { transform: scale(0.9); }
        .cancel-btn { background: #e74c3c; color: white; }
        .equip-btn { background: #2ecc71; color: white; }
        .bg-unlock-notif {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border-radius: 12px; padding: 8px;

        .bg-unlock-notif img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; }
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; margin-bottom: 8px; }
        .settings-item span { font-size: 1.1rem; }
        .toggle-switch { width: 50px; height: 26px; background: #555; border-radius: 13px; position: relative; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.on { background: #4cd137; }
        .toggle-switch::after { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s; }
        .toggle-switch.on::after { transform: translateX(24px); }
        .store-coins { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.4rem; }
        .get-coins-btn {
            background: linear-gradient(135deg, #ffd700, #f0a500); border: none; border-radius: 30px; padding: 12px 28px;
            font-weight: bold; color: #1a1a2e; cursor: pointer; font-size: 1.1rem; letter-spacing: 0.5px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,215,0,0.5); transition: all 0.2s ease; margin-top: 10px;
        }
        .get-coins-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.7); }
        .get-coins-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <script>
    (function(){
        const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
        const gameWrapper=document.getElementById('gameWrapper'),uiOverlay=document.getElementById('uiOverlay');
        const scoreDisplay=document.getElementById('scoreDisplay'),livesDisplay=document.getElementById('livesDisplay');
        const btnLeft=document.getElementById('btnLeft'),btnRight=document.getElementById('btnRight'),mobileControls=document.getElementById('mobileControls');
        const homeBtn=document.getElementById('homeBtn'),coinDisplay=document.getElementById('coinDisplay'),coinAmountSpan=document.getElementById('coinAmount');
        const storeOverlay=document.getElementById('storeOverlay'),storeCloseBtn=document.getElementById('storeCloseBtn');
        const settingsOverlay=document.getElementById('settingsOverlay'),settingsCloseBtn=document.getElementById('settingsCloseBtn'),soundToggle=document.getElementById('soundToggle');
        const previewButtons=document.getElementById('previewButtons'),cancelBgBtn=document.getElementById('cancelBgBtn'),equipBgBtn=document.getElementById('equipBgBtn');
        const bgUnlockNotif=document.getElementById('bgUnlockNotif'),bgUnlockImg=document.getElementById('bgUnlockImg');
        const storeCoinAmount=document.getElementById('storeCoinAmount');
        const getCoinsBtn=document.getElementById('getCoinsBtn');
        const adOverlay=document.getElementById('adOverlay'),adSkipBtn=document.getElementById('adSkipBtn');

        // --- Audio Context para sonidos sintetizados ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playButtonSound() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.1);
            } catch (e) {}
        }
        function playSpawnSound() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            } catch (e) {}
        }
        function playLevelUpSynthesized() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'triangle';
                osc1.frequency.setValueAtTime(400, now);
                osc1.frequency.linearRampToValueAtTime(600, now + 0.3);
                gain1.gain.setValueAtTime(0.15, now);
                gain1.gain.linearRampToValueAtTime(0.1, now + 0.3);
                gain1.gain.setValueAtTime(0.1, now + 0.3);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.5);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(600, now + 0.2);
                osc2.frequency.linearRampToValueAtTime(800, now + 0.5);
                gain2.gain.setValueAtTime(0.12, now + 0.2);
                gain2.gain.linearRampToValueAtTime(0.08, now + 0.5);
                gain2.gain.setValueAtTime(0.08, now + 0.5);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(now + 0.2);
                osc2.stop(now + 0.7);
            } catch (e) {}
        }

        function playTransformPushSound() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            } catch (e) {}
        }

        function playRecycleSound() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 0.2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.5;
                }
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.value = 800;
                bandpass.Q.value = 0.5;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                source.connect(bandpass);
                bandpass.connect(gain);
                gain.connect(audioCtx.destination);
                source.start(now);
                source.stop(now + 0.2);
            } catch (e) {}
        }

        function playSmokeSound() {
            if (!soundOn) return;
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 0.4;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * 0.5;
                }
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                const lowpass = audioCtx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.value = 500;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                source.connect(lowpass);
                lowpass.connect(gain);
                gain.connect(audioCtx.destination);
                source.start(now);
                source.stop(now + 0.4);
            } catch (e) {}
        }

        // --- Sonidos con MP3 externos ---
        const eatSoundUrl = "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/COMIENDO%20%E2%80%91%20Made%20with%20FlexClip.mp3";
        const angrySoundUrl = "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/ENOJADO%20%E2%80%91%20Made%20with%20FlexClip.mp3";
        const levelUpSoundUrl = "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/SUBIDA%20DE%20NIVEL%20%E2%80%91%20Made%20with%20FlexClip.mp3";
        const deathSoundUrl = "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/MUERTE%20%E2%80%91%20Made%20with%20FlexClip.mp3";
        const bgMusicUrls = [
            "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Afternoon_at_the_Crossing.mp3",
            "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Marshmallows_On_The_Water.mp3",
            "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Pondside_Sway.mp3",
            "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Riverbank_Afternoon.mp3",
            "https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Riverbank_Siesta.mp3"
        ];

        function playSoundFromUrl(url) {
            if (!soundOn) return;
            try {
                const audio = new Audio(url);
                audio.volume = 1.0;
                audio.play().catch(e => {});
            } catch(e) {}
        }

        let bgMusic = null;
        let musicInitialized = false;
        function initBgMusic() {
            if (!bgMusic) {
                const randomIndex = Math.floor(Math.random() * bgMusicUrls.length);
                bgMusic = new Audio(bgMusicUrls[randomIndex]);
                bgMusic.loop = true;
                bgMusic.volume = 0.3;
            }
            if (soundOn && bgMusic.paused) {
                bgMusic.play().catch(e => {});
            }
        }
        function restartBgMusic() {
            if (bgMusic) {
                bgMusic.pause();
                bgMusic.currentTime = 0;
                bgMusic = null;
            }
            const randomIndex = Math.floor(Math.random() * bgMusicUrls.length);
            bgMusic = new Audio(bgMusicUrls[randomIndex]);
            bgMusic.loop = true;
            bgMusic.volume = 0.3;
            if (soundOn) {
                bgMusic.play().catch(e => {});
            }
        }
        function toggleBgMusic() {
            if (!bgMusic) return;
            if (soundOn && bgMusic.paused) {
                bgMusic.play().catch(e => {});
            } else if (!soundOn && !bgMusic.paused) {
                bgMusic.pause();
            }
        }

        // --- IMÁGENES BASE (sin cambios) ---
        const restartImg=new Image();restartImg.crossOrigin="anonymous";restartImg.src="https://cdn.jsdelivr.net/gh/SLOBIROSERVER/MARSHCOCO@main/Copilot_20260628_132944.png";

                if(c.x>=mbx&&c.x<=mbx+mbw&&c.y>=ay&&c.y<=ay+mbh){playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } addButtonPress('adventure'); transitionState='toAdventureFadeOut';transitionAlpha=0;e.preventDefault();return;}e.preventDefault();return;}
                if(menuPage===1){const sl=getLevelFromPoint(c.x,c.y);if(sl!==null){const ad=loadAdventureProgress();if(sl<=ad.maxLevel){playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } showInterstitialAd(()=>{transitionState='toGameFadeOut';transitionAlpha=0;restartGame('adventure',sl);});e.preventDefault();return;}else{e.preventDefault();return;}}else{menuSwipeStartX=c.x;menuSwipeActive=true;e.preventDefault();return;}}
                if(menuPage===0){const sbw=180,sbh=180,sbx=(BASE_WIDTH-sbw)/2,sby=CROC_Y-190;if(c.x>=sbx&&c.x<=sbx+sbw&&c.y>=sby&&c.y<=sby+sbh){playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } addButtonPress('start'); showModeSelect=true;e.preventDefault();return;}e.preventDefault();return;}}
            if(gameState===STATE.GAMEOVER){
                if(reviveCount<3){
                    const rbx=crocX,rby=CROC_Y-110;
                    if(Math.abs(c.x-rbx)<80&&Math.abs(c.y-rby)<20){playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } revivePlayer(); e.preventDefault(); return;}
                }
                const bx=crocX,by=CROC_Y-180;
                if(Math.abs(c.x-bx)<100&&Math.abs(c.y-by)<100){
                    playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } transitionState='toGameFadeOut';transitionAlpha=0;restartGame(gameMode,gameMode==='adventure'?currentAdventureLevel:1);e.preventDefault();return;
                }
            }
            if(gameState!==STATE.PLAYING||levelIntroActive)return;
            if(handleDirectBrownClick(c.x,c.y)){e.preventDefault();return;}
            const m=findSwipableMarshmallow(c.x,c.y);if(m){startSwipe(m,c.x,c.y);e.preventDefault();}else convertAllBrownMarshmallows();
        }
        function handleCanvasPointerUp(e){if(showBgPreview)return;if(gameState===STATE.MENU&&menuSwipeActive){const c=getCanvasCoords(e);const dx=c.x-menuSwipeStartX;if(Math.abs(dx)>MENU_SWIPE_THRESHOLD&&dx>0&&menuPage===1){menuPage=0;targetScrollX=0;transitionState='fromBlack';transitionAlpha=1;}menuSwipeActive=false;}if(swipeActive)endSwipe();}
        canvas.addEventListener('mousedown',handleCanvasPointerDown);canvas.addEventListener('mouseup',handleCanvasPointerUp);
        canvas.addEventListener('touchstart',e=>{const t=e.touches[0];if(!t)return;handleCanvasPointerDown(t);},{passive:false});
        canvas.addEventListener('touchend',e=>{if(showBgPreview)return;if(gameState===STATE.MENU&&menuSwipeActive){const t=e.changedTouches[0];if(!t)return;const c=getCanvasCoords(t);const dx=c.x-menuSwipeStartX;if(Math.abs(dx)>MENU_SWIPE_THRESHOLD&&dx>0&&menuPage===1){menuPage=0;targetScrollX=0;transitionState='fromBlack';transitionAlpha=1;}menuSwipeActive=false;}if(swipeActive&&!levelIntroActive){e.preventDefault();endSwipe();}});
        canvas.addEventListener('touchcancel',()=>{menuSwipeActive=false;if(swipeActive)endSwipe();});
        btnLeft.addEventListener('pointerdown',e=>{e.preventDefault();playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } mobileLeftPressed=true;});btnLeft.addEventListener('pointerup',e=>{e.preventDefault();mobileLeftPressed=false;});btnLeft.addEventListener('pointerleave',()=>{mobileLeftPressed=false;});
        btnRight.addEventListener('pointerdown',e=>{e.preventDefault();playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } mobileRightPressed=true;});btnRight.addEventListener('pointerup',e=>{e.preventDefault();mobileRightPressed=false;});btnRight.addEventListener('pointerleave',()=>{mobileRightPressed=false;});
        [btnLeft,btnRight].forEach(b=>{b.addEventListener('touchstart',e=>{e.preventDefault();playButtonSound(); if (!musicInitialized) { musicInitialized = true; initBgMusic(); } if(b===btnLeft)mobileLeftPressed=true;else mobileRightPressed=true;});b.addEventListener('touchend',e=>{e.preventDefault();mobileLeftPressed=false;mobileRightPressed=false;});b.addEventListener('touchcancel',()=>{mobileLeftPressed=false;mobileRightPressed=false;});});
        function checkMobile(){mobileControls.style.display=(!isMobileMode&&(/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent)||('ontouchstart' in window&&window.innerWidth<769)))?'flex':'none';}checkMobile();window.addEventListener('resize',checkMobile);
        function autoStart(){
            loadClassicMaxLevel();
            const adProg=loadAdventureProgress();
            if(adProg.maxLevel>=5) unlockSkin('mud');
            if(adProg.maxLevel>=10) unlockSkin('soap');
            loadCoins();
            resizeCanvas();updateScoreUI();updateLivesUI();scoreDisplay.textContent=score;resetCrocPosition();crocMouthOpen=0;crocMouthTarget=0;safeTimer=3;
            gameState=STATE.PRESTART;
            introPhase='fadeIn';introTimer=0;introAlpha=0;transitionState=null;transitionAlpha=0;menuPage=0;menuScrollX=0;targetScrollX=0;showModeSelect=false;uiOverlay.style.display='none';homeBtn.style.display='none';updateCoinDisplay();lastFrameTime=performance.now();if(gameLoopId)cancelAnimationFrame(gameLoopId);gameLoopId=requestAnimationFrame(gameLoop);checkMobile();
        }
        autoStart();
    })();
    </script>
