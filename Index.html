<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐊 CrocoMalvaviscos - Auto</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --gold: #f0c27a;
            --pink: #ff9a9e;
            --white: #fdfcfb;
            --blue: #a1c4fd;
            --brown: #8b5e3c;
            --yellow-aura: #ff3333;
            --green-aura: #5ce65c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a15;
            background-image:
                radial-gradient(ellipse at 50% 30%, #1a1a35 0%, #0a0a15 60%),
                repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Nunito', system-ui, sans-serif;
            overflow-x: hidden; user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; padding: 10px;
        }
        .game-wrapper {
            position: relative;
            background: linear-gradient(180deg, #1a1a32 0%, #1e1e3a 30%, #1c1c35 100%);
            border-radius: 28px;
            box-shadow:
                0 25px 80px rgba(0,0,0,0.6),
                0 0 0 4px rgba(255,255,255,0.1),
                0 0 0 8px rgba(0,0,0,0.4),
                0 0 150px rgba(240,194,122,0.12),
                inset 0 0 80px rgba(0,0,0,0.2);
            overflow: hidden; max-width: 750px; width: 100%;
            aspect-ratio: 700/580; max-height: 90vh;
            transition: transform 0.3s ease;
        }
        .game-wrapper.mobile-mode {
            aspect-ratio: 400/700;
            max-width: 400px;
        }
        .game-wrapper:hover { transform: translateY(-3px); box-shadow: 0 30px 90px rgba(0,0,0,0.65), 0 0 0 4px rgba(255,255,255,0.15), 0 0 0 8px rgba(0,0,0,0.4), 0 0 170px rgba(240,194,122,0.18); }
        canvas { display: block; width: 100%; height: 100%; border-radius: 26px; cursor: default; touch-action: none; }
        .ui-overlay { position: absolute; top: 14px; left: 18px; right: 18px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; gap: 10px; }
        .score-pill {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25); border-radius: 50px; padding: 8px 18px;
            color: #fff; font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            height: 44px;
            box-sizing: border-box;
            min-width: 80px;
        }
        .score-pill .value {
            font-size: 1.05rem; color: #ffffff; text-align: center; font-weight: 900;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }
        .lives-pill {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.25); border-radius: 50px; padding: 8px 18px;
            color: #fff; font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            height: 44px;
            box-sizing: border-box;
        }
        .lives-pill .heart { font-size: 1.3rem; transition: all 0.3s ease; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4)); }
        .lives-pill .heart.lost { opacity: 0.2; transform: scale(0.65); filter: grayscale(1) drop-shadow(0 0 0 transparent); }
        .combo-indicator { display: none; }
        .level-up-popup { display: none; }
        .game-over-overlay { display: none; }
        .mobile-controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: none; gap: 24px; z-index: 15; }
        .ctrl-btn { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.3); color: #fff; font-size: 2rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .ctrl-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.85); border-color: rgba(255,255,255,0.6); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-overlay">
            <div class="score-pill">
                <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="lives-pill" id="livesDisplay"><span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span></div>
        </div>
        <div class="mobile-controls" id="mobileControls">
            <button class="ctrl-btn" id="btnLeft">◀</button>
            <button class="ctrl-btn" id="btnRight">▶</button>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const gameWrapper = document.getElementById('gameWrapper');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const mobileControls = document.getElementById('mobileControls');

            // --- IMÁGENES ---
            const restartImg = new Image();

            restartImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_132944.png";

            const bonus5Img = new Image();

            bonus5Img.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_152504.png";

            const bonus10Img = new Image();
            bonus10Img.crossOrigin = "anonymous";
            bonus10Img.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_152609.png";

            // Imágenes de nivel (1 al 9)
            const levelImages = [];
            levelImages[1] = new Image(); levelImages[1].crossOrigin = "anonymous"; levelImages[1].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_150257.png";
            levelImages[2] = new Image(); levelImages[2].crossOrigin = "anonymous"; levelImages[2].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_150402.png";
            levelImages[3] = new Image(); levelImages[3].crossOrigin = "anonymous"; levelImages[3].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_150512.png";
            levelImages[4] = new Image(); levelImages[4].crossOrigin = "anonymous"; levelImages[4].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_151038.png";
            levelImages[5] = new Image(); levelImages[5].crossOrigin = "anonymous"; levelImages[5].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_151139.png";
            levelImages[6] = new Image(); levelImages[6].crossOrigin = "anonymous"; levelImages[6].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_151339.png";
            levelImages[7] = new Image(); levelImages[7].crossOrigin = "anonymous"; levelImages[7].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_151532.png";
            levelImages[8] = new Image(); levelImages[8].crossOrigin = "anonymous"; levelImages[8].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_152037.png";
            levelImages[9] = new Image(); levelImages[9].crossOrigin = "anonymous"; levelImages[9].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_152134.png";

            const digitImages = [];
            digitImages[0] = new Image(); digitImages[0].crossOrigin = "anonymous"; digitImages[0].src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260628_152254.png";

            let isMobileMode = false;
            let BASE_WIDTH, BASE_HEIGHT;
            let CROC_Y, CROC_MOUTH_TOP, CROC_MOUTH_WIDTH, CROC_SPEED;
            let CHIMNEY_X, CHIMNEY_OPENING_Y, CHIMNEY_OPENING_WIDTH;
            let TRASH_YELLOW_X, TRASH_GREEN_X, TRASH_CAN_Y;
            let confettiTimer = 0;
            let safeTimer = 3.0;

            function setDimensions(mobile) {
                if (mobile) {
                    BASE_WIDTH = 400; BASE_HEIGHT = 700;
                    CROC_Y = 550; CROC_MOUTH_TOP = CROC_Y - 60; CROC_MOUTH_WIDTH = 80; CROC_SPEED = 0;
                    CHIMNEY_X = BASE_WIDTH/2; CHIMNEY_OPENING_Y = 60; CHIMNEY_OPENING_WIDTH = 50;
                    TRASH_YELLOW_X = 40; TRASH_GREEN_X = BASE_WIDTH - 40; TRASH_CAN_Y = BASE_HEIGHT - 90;
                } else {
                    BASE_WIDTH = 700; BASE_HEIGHT = 580;
                    CROC_Y = 430; CROC_MOUTH_TOP = CROC_Y - 48; CROC_MOUTH_WIDTH = 70; CROC_SPEED = 420;
                    CHIMNEY_X = BASE_WIDTH/2; CHIMNEY_OPENING_Y = 40; CHIMNEY_OPENING_WIDTH = 44;
                    TRASH_YELLOW_X = 60; TRASH_GREEN_X = BASE_WIDTH - 60; TRASH_CAN_Y = BASE_HEIGHT - 70;
                }
            }

            function detectDevice() {
                const ua = navigator.userAgent;
                const mobileRegex = /Android|iPhone|iPad|iPod|webOS/i;
                return mobileRegex.test(ua) || ('ontouchstart' in window && window.innerWidth < 769);
            }

            isMobileMode = detectDevice();
            setDimensions(isMobileMode);
            if (isMobileMode) {
                gameWrapper.classList.add('mobile-mode');
            } else {
                gameWrapper.classList.remove('mobile-mode');
            }

            // Imágenes originales
            const crocImgClosed = new Image(); const crocImgOpen = new Image(); const crocImgHurt = new Image(); const crocImgDead = new Image(); const crocImgLevelUp = new Image();
            crocImgClosed.crossOrigin = "anonymous"; crocImgOpen.crossOrigin = "anonymous"; crocImgHurt.crossOrigin = "anonymous"; crocImgDead.crossOrigin = "anonymous"; crocImgLevelUp.crossOrigin = "anonymous";
            crocImgClosed.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260618_211942.png";
            crocImgOpen.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260618_212002.png";
            crocImgHurt.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260618_213137.png";
            crocImgDead.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260618_213541.png";
            crocImgLevelUp.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260618_212950.png";

            const trashGreenImg = new Image(); const trashYellowImg = new Image();
            trashGreenImg.crossOrigin = "anonymous"; trashYellowImg.crossOrigin = "anonymous";
            trashGreenImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260624_204702.png";
            trashYellowImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260624_204835.png";

            const marshPinkImg = new Image(); const marshBlueImg = new Image(); const marshWhiteImg = new Image(); const marshBrownImg = new Image();
            marshPinkImg.crossOrigin = "anonymous"; marshBlueImg.crossOrigin = "anonymous"; marshWhiteImg.crossOrigin = "anonymous"; marshBrownImg.crossOrigin = "anonymous";
            marshPinkImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260619_220721.png";
            marshBlueImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260619_221538.png";
            marshWhiteImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260619_221707.png";
            marshBrownImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260619_221829.png";

            const toxicYellowImg = new Image(); const toxicGreenImg = new Image();
            toxicYellowImg.crossOrigin = "anonymous"; toxicGreenImg.crossOrigin = "anonymous";
            toxicYellowImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260624_203421.png";
            toxicGreenImg.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260624_203535.png";

            const bgImage = new Image();
            bgImage.crossOrigin = "anonymous";
            bgImage.src = "https://raw.githubusercontent.com/SLOBIROSERVER/MARSHCOCO/main/Copilot_20260624_210212.png";

            const TARGET_CROC_WIDTH = 520; const TARGET_CROC_HEIGHT = 480;
            const TRASH_TARGET_WIDTH = 123; const TRASH_TARGET_HEIGHT = 158;
            const MARSH_TARGET_WIDTH = 96; const MARSH_TARGET_HEIGHT = 108;
            const TOXIC_TARGET_WIDTH = 96; const TOXIC_TARGET_HEIGHT = 108;
            const BG_TARGET_WIDTH = 700; const BG_TARGET_HEIGHT = 580;

            let scale = 1;
            function resizeCanvas() {
                const rect = gameWrapper.getBoundingClientRect();
                const maxW = rect.width, maxH = rect.height || (maxW / (BASE_WIDTH/BASE_HEIGHT));
                const dpr = Math.min(window.devicePixelRatio||1, 2);
                const targetW = Math.min(maxW, BASE_WIDTH), targetH = targetW / (BASE_WIDTH/BASE_HEIGHT);
                canvas.width = targetW * dpr; canvas.height = targetH * dpr;
                canvas.style.width = targetW + 'px'; canvas.style.height = targetH + 'px';
                scale = targetW / BASE_WIDTH;
                ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr*scale, dpr*scale);
            }
            window.addEventListener('resize', resizeCanvas);

            const STATE = { PLAYING: 'playing', GAMEOVER: 'gameover' };
            let gameState = STATE.PLAYING;
            let score = 0, lives = 3, comboCount = 0, comboTimer = 0;
            let totalCaught = 0, totalTransformed = 0, totalRecycled = 0, totalLost = 0;
            let marshmallows = [], particles = [], smokeParticles = [];
            let shakeAmount = 0, shakeDuration = 0;
            let spawnTimer = 0, spawnInterval = 80, difficultyLevel = 1;
            let crocX, crocTargetX, crocMouthOpen = 0, crocMouthTarget = 0;
            let keysPressed = {}, lastFrameTime = performance.now(), frameCount = 0;
            let swipedMarshmallow = null, swipeStartX = 0, swipeStartY = 0, swipeActive = false, swipeCurrentX = 0, swipeCurrentY = 0;
            let smokeActive = false, smokeTimer = 0, canWobbleYellow = 0, canWobbleGreen = 0;
            let slowMotionTimer = 0;
            let currentLevel = 1, maxLevel = 1, levelScore = 0, levelThreshold = 200, levelUpDisplayTimer = 0;
            let isHurt = false, hurtTimer = 0;
            let isLevelUp = false, levelUpTimer = 0;

            function resetCrocPosition() { crocX = BASE_WIDTH/2; crocTargetX = BASE_WIDTH/2; }

            const SAFE_COLORS = ['#ff9a9e','#fdfcfb','#a1c4fd'];
            const BROWN_COLOR = '#8b5e3c', BROWN_HEX = '#8b5e3c';
            const AURA_RED = '#ff3333'; const AURA_GREEN = '#5ce65c';
            const RECYCLE_SPEED = 4.5, SWIPE_THRESHOLD = 30;

            // Progresión más suave: umbrales reducidos un 15 %
            function getThresholdForLevel(level) {
                const baseThresholds = [0, 200, 500, 1000, 1800, 3000, 4600, 6800, 9600, 13200, 17600];
                if (level <= 10) return Math.floor((baseThresholds[level] || 17600) * 0.85);
                return Math.floor(17600 * Math.pow(1.5, level - 10) * 0.85);
            }

            function saveProgress() { try { const data = { maxLevel: maxLevel }; localStorage.setItem('crocodileProgress', JSON.stringify(data)); } catch(e) {} }
            function loadMaxLevel() { try { const raw = localStorage.getItem('crocodileProgress'); if (raw) { const data = JSON.parse(raw); if (typeof data.maxLevel === 'number') maxLevel = data.maxLevel; } } catch(e) {} }

            function roundRect(ctx,x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); }

            function getMarshImage(color, isBrown, aura) {
                if (aura === 'yellow') return toxicYellowImg;
                if (aura === 'green') return toxicGreenImg;
                if (isBrown) return marshBrownImg;
                if (color === '#ff9a9e') return marshPinkImg;
                if (color === '#a1c4fd') return marshBlueImg;
                if (color === '#fdfcfb') return marshWhiteImg;
                return marshWhiteImg;
            }

            class Marshmallow {
                constructor(x,y,color,isBrown=false,aura=null,bonus=0,isGolden=false) {
                    this.x=x;this.y=y;this.color=color;this.isBrown=isBrown;this.aura=aura;this.bonus=bonus;this.isGolden=isGolden;
                    this.clicksRemaining=isBrown?2:0;
                    this.speed= 50 + Math.random()*60 + difficultyLevel*8;
                    this.wobblePhase=Math.random()*Math.PI*2;this.wobbleAmp=0.4+Math.random()*0.8;
                    this.wobbleFreq=1.5+Math.random()*2.5;this.rotation=(Math.random()-0.5)*0.25;this.scalePulse=1;this.pulseDir=1;
                    this.clickFlashTimer=0;this.sparkTimer=0;this.auraPulse=0;this.auraPulseDir=1;this.recycling=false;this.recycleProgress=0;
                    this.recycleStartX=0;this.recycleStartY=0;this.recycleTargetX=0;this.recycleTargetY=0;this.recycleCorrect=false;
                    this.updateImageRef();
                }
                updateImageRef() {
                    this.marshImg = getMarshImage(this.color, this.isBrown && this.clicksRemaining > 0, this.aura);
                }
                update(dt) {
                    if(this.recycling){this.recycleProgress+=RECYCLE_SPEED*dt;if(this.recycleProgress>=1){this.recycleProgress=1;this.finishRecycle();return;}const t=this.recycleProgress;this.x=this.recycleStartX+(this.recycleTargetX-this.recycleStartX)*t;this.y=this.recycleStartY+(this.recycleTargetY-this.recycleStartY)*t;this.rotation*=0.9;return;}
                    const speedMult=slowMotionTimer>0?0.45:1;this.y+=this.speed*speedMult*dt;this.wobblePhase+=this.wobbleFreq*dt*4;
                    this.x+=Math.sin(this.wobblePhase)*this.wobbleAmp*dt*60;this.rotation+=(Math.sin(this.wobblePhase*0.7)*0.02)*dt*60;
                    if(this.isBrown&&this.clicksRemaining>0){this.scalePulse+=0.04*this.pulseDir*dt*60;if(this.scalePulse>=1.08)this.pulseDir=-1;if(this.scalePulse<=0.94)this.pulseDir=1;}
                    if(this.clickFlashTimer>0)this.clickFlashTimer-=dt;if(this.sparkTimer>0)this.sparkTimer-=dt;
                    if(this.aura){this.auraPulse+=0.05*this.auraPulseDir*dt*60;if(this.auraPulse>=1){this.auraPulse=1;this.auraPulseDir=-1;}if(this.auraPulse<=0.3){this.auraPulse=0.3;this.auraPulseDir=1;}}
                }
                finishRecycle(){
                    if(this.recycleCorrect){
                        totalRecycled++;addScore(25 + this.bonus);comboCount+=2;comboTimer=1.0;spawnParticles(this.x,this.y,this.aura==='yellow'?AURA_RED:AURA_GREEN,20);
                        if(this.aura==='yellow')canWobbleYellow=18;else if(this.aura==='green')canWobbleGreen=18;
                    }else{
                        if(this.aura==='yellow')canWobbleGreen=18;else if(this.aura==='green')canWobbleYellow=18;
                        shakeAmount=8;shakeDuration=0.6;spawnSmoke(this.x,this.y,35);smokeActive=true;smokeTimer=2.8;
                        spawnParticles(this.x,this.y,'#ff3333',25);
                    }
                    updateScoreUI();const idx=marshmallows.indexOf(this);if(idx>=0)marshmallows.splice(idx,1);
                }
                draw(ctx){
                    ctx.save();ctx.translate(this.x,this.y);
                    let s=1;if(this.recycling)s=1-this.recycleProgress;else if(this.isBrown&&this.clicksRemaining>0)s=this.scalePulse;
                    ctx.scale(s,s);ctx.rotate(this.rotation);
                    if(this.aura&&!this.recycling){
                        const auraColor=this.aura==='yellow'?AURA_RED:AURA_GREEN;
                        const auraAlpha=0.4+this.auraPulse*0.35; const auraSize=16+this.auraPulse*12;
                        ctx.shadowColor=auraColor;ctx.shadowBlur=auraSize+8;
                        const gradAura=ctx.createRadialGradient(0,0,5,0,0,30+auraSize);
                        gradAura.addColorStop(0, auraColor.replace(')',`, ${auraAlpha+0.2})`).replace('rgb','rgba').replace('#ff3333','rgba(255,51,51,'+(auraAlpha+0.2)+')').replace('#5ce65c','rgba(92,230,92,'+(auraAlpha+0.2)+')'));
                        gradAura.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=gradAura; ctx.beginPath();ctx.arc(0,0,30+auraSize,0,Math.PI*2);ctx.fill(); ctx.shadowColor='transparent';ctx.shadowBlur=0;
                    }
                    if(this.isGolden&&!this.recycling){ ctx.shadowColor='#FFD700';ctx.shadowBlur=22; const goldGlow=ctx.createRadialGradient(0,0,5,0,0,35); goldGlow.addColorStop(0,'rgba(255,215,0,0.7)');goldGlow.addColorStop(1,'rgba(255,215,0,0)'); ctx.fillStyle=goldGlow; ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fill(); ctx.shadowColor='transparent';ctx.shadowBlur=0; }
                    const img = this.marshImg;
                    if (img && img.complete && img.naturalWidth > 0) {
                        const w = this.aura ? TOXIC_TARGET_WIDTH : MARSH_TARGET_WIDTH;
                        const h = this.aura ? TOXIC_TARGET_HEIGHT : MARSH_TARGET_HEIGHT;
                        ctx.drawImage(img, -w/2, -h/2, w, h);
                        if (this.isGolden) { ctx.fillStyle = 'rgba(255,215,0,0.4)'; ctx.beginPath(); ctx.arc(0, 0, w/2, 0, Math.PI*2); ctx.fill(); }
                    } else { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill(); }
                    
                    // Bonus +5 y +10 con imágenes 2x del tamaño anterior = 400x240
                    if(this.bonus>0 && !this.recycling){
                        if (this.bonus === 5 && bonus5Img.complete && bonus5Img.naturalWidth > 0) {
                            ctx.drawImage(bonus5Img, -200, -120, 400, 240);
                        } else if (this.bonus === 10 && bonus10Img.complete && bonus10Img.naturalWidth > 0) {
                            ctx.drawImage(bonus10Img, -200, -120, 400, 240);

                spawnInterval = Math.max(38, 80 - difficultyLevel*2.5);
                spawnTimer+=dt*60;
                if(spawnTimer>=spawnInterval&&gameState===STATE.PLAYING&&!smokeActive){spawnTimer=0;spawnMarshmallow();if(difficultyLevel>=4&&Math.random()<0.2)setTimeout(()=>{if(gameState===STATE.PLAYING)spawnMarshmallow();},150+Math.random()*200);}
                for(let i=marshmallows.length-1;i>=0;i--){const m=marshmallows[i];m.update(dt);if(m.recycling&&m.recycleProgress>=1)continue;if(!m.recycling){const c=checkCrocCollision(m);if(c){eatMarshmallow(m,i);continue;}if(m.isOffScreen())marshmallows.splice(i,1);}}
                if (!isMobileMode) {
                    let moveDir=0;if(keysPressed['ArrowLeft']||keysPressed['KeyA']||keysPressed['a']||mobileLeftPressed)moveDir=-1;if(keysPressed['ArrowRight']||keysPressed['KeyD']||keysPressed['d']||mobileRightPressed)moveDir=1;if(moveDir!==0&&gameState===STATE.PLAYING)crocTargetX+=moveDir*CROC_SPEED*dt;
                    crocTargetX=Math.max(CROC_MOUTH_WIDTH/2+5,Math.min(BASE_WIDTH-CROC_MOUTH_WIDTH/2-5,crocTargetX));crocX+=(crocTargetX-crocX)*Math.min(1,14*dt);
                } else { crocX = BASE_WIDTH/2; }
                let closestDist = Infinity;
                for (const m of marshmallows) { if (m.recycling || m.isBeingDragged) continue; if (m.aura || (m.isBrown && m.clicksRemaining > 0)) continue; const dist = Math.abs(m.y - CROC_Y); if (dist < closestDist) closestDist = dist; }
                if (closestDist < 80) { const proximityTarget = 8 * (1 - closestDist / 80); crocMouthTarget = Math.max(crocMouthTarget, proximityTarget); }
                crocMouthOpen += (crocMouthTarget - crocMouthOpen) * Math.min(1, 10*dt);if(Math.abs(crocMouthTarget - crocMouthOpen) < 0.3) crocMouthTarget = 0;
                if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}if(shakeDuration>0){shakeDuration-=dt;if(shakeDuration<=0)shakeAmount=0;else shakeAmount*=Math.exp(-6*dt);}
            }
            function render(ctx){
                ctx.clearRect(0,0,BASE_WIDTH,BASE_HEIGHT);let sx=0,sy=0;if(shakeAmount>0.3){sx=(Math.random()-0.5)*shakeAmount*2;sy=(Math.random()-0.5)*shakeAmount*2;}ctx.save();ctx.translate(sx,sy);
                drawBackground(ctx);drawLevelBar(ctx);
                drawTrashCan(ctx,TRASH_YELLOW_X,TRASH_CAN_Y,trashYellowImg,canWobbleYellow);
                drawTrashCan(ctx,TRASH_GREEN_X,TRASH_CAN_Y,trashGreenImg,canWobbleGreen);
                drawCrocodile(ctx);
                for(const m of marshmallows)m.draw(ctx);
                if(swipeActive&&swipedMarshmallow){const m=swipedMarshmallow,dx=swipeCurrentX-swipeStartX,a=Math.atan2(swipeCurrentY-swipeStartY,dx);ctx.strokeStyle=m.aura==='yellow'?'rgba(255,51,51,0.7)':'rgba(92,230,92,0.7)';ctx.lineWidth=3;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x+Math.cos(a)*45,m.y+Math.sin(a)*45);ctx.stroke();ctx.setLineDash([]);}
                for(const p of particles)p.draw(ctx);for(const s of smokeParticles)s.draw(ctx);if(smokeActive&&smokeTimer<2.0){ctx.fillStyle=`rgba(25,25,25,${Math.min(0.65,(1-smokeTimer/2.8)*0.85)})`;ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);}
                
                drawComboImage(ctx);
                drawLevelUpImage(ctx);
                
                if(gameState === STATE.GAMEOVER) {
                    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);
                    const btnX = crocX, btnY = CROC_Y - 180;
                    // Botón de reinicio palpitante
                    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.08;
                    ctx.save();
                    ctx.translate(btnX, btnY);
                    ctx.scale(pulse, pulse);
                    if(restartImg.complete && restartImg.naturalWidth > 0){
                        const btnSize = 200;
                        ctx.drawImage(restartImg, -btnSize/2, -btnSize/2, btnSize, btnSize);
                    } else {
                        ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI*2);
                        ctx.fillStyle = '#FFD700'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                        ctx.fillStyle = '#000'; ctx.font = 'bold 24px "Segoe UI"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('↺', 0, 0);
                    }
                    ctx.restore();
                }
                ctx.restore();if(slowMotionTimer>0){ctx.fillStyle='rgba(100,150,255,0.06)';ctx.fillRect(0,0,BASE_WIDTH,BASE_HEIGHT);}
            }

            let mobileLeftPressed=false,mobileRightPressed=false;
            window.addEventListener('keydown',e=>{keysPressed[e.code]=true;if(['ArrowLeft','ArrowRight','KeyA','KeyD'].includes(e.code))e.preventDefault();});
            window.addEventListener('keyup',e=>{keysPressed[e.code]=false;});
            canvas.addEventListener('mousedown',e=>{
                const c=getCanvasCoords(e);
                if(gameState===STATE.GAMEOVER) {
                    const btnX = crocX, btnY = CROC_Y - 180;
                    if(Math.abs(c.x-btnX) < 100 && Math.abs(c.y-btnY) < 100) { restartGame(); return; }
                }
                if(gameState!==STATE.PLAYING)return;
                if (handleDirectBrownClick(c.x, c.y)) { e.preventDefault(); return; }
                const m=findSwipableMarshmallow(c.x,c.y);
                if(m){startSwipe(m,c.x,c.y);e.preventDefault();}else convertAllBrownMarshmallows();
            });
            window.addEventListener('mousemove',e=>{if(swipeActive){const c=getCanvasCoords(e);updateSwipe(c.x,c.y);}});
            window.addEventListener('mouseup',()=>{if(swipeActive)endSwipe();});
            canvas.addEventListener('touchstart',e=>{
                const t=e.touches[0];if(!t)return;const c=getCanvasCoords(t);
                if(gameState===STATE.GAMEOVER) {
                    const btnX = crocX, btnY = CROC_Y - 180;
                    if(Math.abs(c.x-btnX) < 100 && Math.abs(c.y-btnY) < 100) { restartGame(); e.preventDefault(); return; }
                }
                if(gameState!==STATE.PLAYING)return;
                if (handleDirectBrownClick(c.x, c.y)) { e.preventDefault(); return; }
                const m=findSwipableMarshmallow(c.x,c.y);
                if(m){startSwipe(m,c.x,c.y);e.preventDefault();}else{ convertAllBrownMarshmallows(); e.preventDefault(); }
            },{passive:false});
            canvas.addEventListener('touchmove',e=>{if(!swipeActive)return;e.preventDefault();const t=e.touches[0];if(!t)return;const c=getCanvasCoords(t);updateSwipe(c.x,c.y);},{passive:false});
            canvas.addEventListener('touchend',e=>{if(swipeActive){e.preventDefault();endSwipe();}});
            canvas.addEventListener('touchcancel',()=>{if(swipeActive)endSwipe();});
            btnLeft.addEventListener('pointerdown',e=>{e.preventDefault();mobileLeftPressed=true;});btnLeft.addEventListener('pointerup',e=>{e.preventDefault();mobileLeftPressed=false;});btnLeft.addEventListener('pointerleave',()=>{mobileLeftPressed=false;});
            btnRight.addEventListener('pointerdown',e=>{e.preventDefault();mobileRightPressed=true;});btnRight.addEventListener('pointerup',e=>{e.preventDefault();mobileRightPressed=false;});btnRight.addEventListener('pointerleave',()=>{mobileRightPressed=false;});
            [btnLeft,btnRight].forEach(b=>{b.addEventListener('touchstart',e=>{e.preventDefault();if(b===btnLeft)mobileLeftPressed=true;else mobileRightPressed=true;});b.addEventListener('touchend',e=>{e.preventDefault();mobileLeftPressed=false;mobileRightPressed=false;});b.addEventListener('touchcancel',()=>{mobileLeftPressed=false;mobileRightPressed=false;});});
            function checkMobile(){mobileControls.style.display=(!isMobileMode&&(/Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent)||('ontouchstart' in window&&window.innerWidth<769)))?'flex':'none';}checkMobile();window.addEventListener('resize',checkMobile);

            function autoStart() {
                loadMaxLevel();
                resizeCanvas();
                levelThreshold = getThresholdForLevel(1);
                updateScoreUI(); updateLivesUI(); scoreDisplay.textContent = score;
                resetCrocPosition(); crocMouthOpen = 0; crocMouthTarget = 0;
                safeTimer = 3.0;
                for(let i=0;i<2;i++) setTimeout(()=>{ if(gameState===STATE.PLAYING) spawnMarshmallow(); }, i*500);
                lastFrameTime = performance.now();
                if (gameLoopId) cancelAnimationFrame(gameLoopId);
                gameLoopId = requestAnimationFrame(gameLoop);
                checkMobile();
            }

            autoStart();
        })();
    </script>
</body>
</html>
